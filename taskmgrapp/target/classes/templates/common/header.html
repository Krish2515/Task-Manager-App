<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <title>Header</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:fragment="header">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">

      <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
        TaskMgr
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">

        <!-- LEFT MENU -->
        <ul class="navbar-nav me-auto">

          <li class="nav-item">
            <a class="nav-link" th:href="@{/dashboard}">Home</a>
          </li>

          <li class="nav-item" sec:authorize="isAuthenticated()">
            <a class="nav-link" th:href="@{/tasks}">Tasks</a>
          </li>

          <li class="nav-item" sec:authorize="hasRole('ADMIN')">
            <a class="nav-link" th:href="@{/createTask}">Create</a>
          </li>

          <li class="nav-item" sec:authorize="hasRole('ADMIN')">
            <a class="nav-link" th:href="@{/users}">Users</a>
          </li>

        </ul>

        <!-- RIGHT SIDE -->
        <div class="d-flex">

          <!-- NOT LOGGED IN -->
          <div sec:authorize="!isAuthenticated()">
            <a class="btn btn-outline-light me-2" th:href="@{/login}">Login</a>
            <a class="btn btn-warning" th:href="@{/register}">Register</a>
          </div>

          <!-- LOGGED IN -->
          <div sec:authorize="isAuthenticated()">
            <a class="btn btn-danger" th:href="@{/logout}">Logout</a>
          </div>

        </div>

      </div>
    </div>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
