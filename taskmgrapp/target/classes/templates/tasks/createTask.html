<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>TaskManagerApp | Create Task</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            min-height: 100vh;
        }

        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

<!-- ✅ Header (only for logged-in pages) -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Task Manager</span>

    <div>
        <a th:href="@{/login}" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<!-- ✅ Centered Card Layout -->
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card shadow p-4" style="width: 600px;">

        <h3 class="text-center mb-4">Create Task</h3>

        <form method="post" th:action="@{/tasks}" th:object="${task}">

            <!-- Name -->
            <div class="mb-3">
                <label class="form-label">Task Name</label>
                <input type="text" class="form-control" th:field="*{name}" />
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
            </div>

            <!-- Dates -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Start Date</label>
                    <input type="date" class="form-control" th:field="*{startDate}" />
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">End Date</label>
                    <input type="date" class="form-control" th:field="*{endDate}" />
                </div>
            </div>

            <!-- Priority -->
            <div class="mb-3">
                <label class="form-label">Priority</label>
                <select class="form-control" th:field="*{priority}">
                    <option value="HIGH">HIGH</option>
                    <option value="MEDIUM">MEDIUM</option>
                    <option value="LOW">LOW</option>
                </select>
            </div>

            <!-- Status -->
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select class="form-control" th:field="*{status}">
                    <option value="TODO">TODO</option>
                    <option value="PENDING">PENDING</option>
                    <option value="COMPLETED">COMPLETED</option>
                </select>
            </div>

            <!-- Button -->
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Create Task</button>
            </div>

            <div class="text-center mt-3">
                <a th:href="@{/dashboard}" class="btn btn-secondary px-4">
                    ← Back
                </a>
            </div>

        </form>


    </div>
</div>

</body>
</html>
