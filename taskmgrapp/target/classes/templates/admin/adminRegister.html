<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>TaskManagerApp | Register</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* SAME AS LOGIN PAGE */
    body {
        background: linear-gradient(to right, #667eea, #764ba2);
        height: 100vh;
    }
    .card {
        border-radius: 15px;
    }
  </style>
</head>

<body>


<!-- Register Card -->
<div class="container d-flex justify-content-center align-items-center" style="height: 90vh;">
  <div class="card shadow p-4" style="width: 400px;">

    <h3 class="text-center mb-4">Admin Register</h3>

    <!-- Success Message -->
    <div th:if="${param.success}">
      <div class="alert alert-success text-center">
        Registration successful 🎉
      </div>
    </div>

    <form method="post" th:action="@{/admin/register/save}" th:object="${user}">

      <!-- First Name -->
      <div class="mb-3">
        <input type="text" class="form-control"
               placeholder="First Name"
               th:field="*{firstName}" />
        <small class="text-danger"
               th:if="${#fields.hasErrors('firstName')}"
               th:errors="*{firstName}"></small>
      </div>

      <!-- Last Name -->
      <div class="mb-3">
        <input type="text" class="form-control"
               placeholder="Last Name"
               th:field="*{lastName}" />
        <small class="text-danger"
               th:if="${#fields.hasErrors('lastName')}"
               th:errors="*{lastName}"></small>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <input type="email" class="form-control"
               placeholder="Email"
               th:field="*{email}" />
        <small class="text-danger"
               th:if="${#fields.hasErrors('email')}"
               th:errors="*{email}"></small>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <input type="password" class="form-control"
               placeholder="Password"
               th:field="*{password}" />
        <small class="text-danger"
               th:if="${#fields.hasErrors('password')}"
               th:errors="*{password}"></small>
      </div>

      <!-- Button -->
      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Register</button>
      </div>

      <!-- Login Link -->
      <div class="text-center mt-3">
        <small>
          Already registered?
          <a th:href="@{/adminLogin}">Login here</a>
        </small>
      </div>

    </form>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
