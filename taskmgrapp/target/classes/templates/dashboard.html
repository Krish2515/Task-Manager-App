<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Dashboard | TaskManager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

<!-- Navbar (ONLY after login) -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Task Manager</span>

    <div>
        <a th:href="@{/tasks}" class="btn btn-outline-light btn-sm me-2">Tasks</a>
        <a th:href="@{/createTask}" class="btn btn-outline-light btn-sm me-2">Add Task</a>
        <a th:href="@{/login}" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<!-- Dashboard Content -->
<div class="container mt-5">

    <div class="row text-center">

        <!-- Total Tasks -->
        <div class="col-md-4">
            <div class="card shadow p-4">
                <h5>Total Tasks</h5>
                <h2 th:text="${totalTasks}">0</h2>
            </div>
        </div>

        <!-- Completed -->
        <div class="col-md-4">
            <div class="card shadow p-4">
                <h5>Completed</h5>
                <h2 th:text="${completedTasks}">0</h2>
            </div>
        </div>

        <!-- Pending -->
        <div class="col-md-4">
            <div class="card shadow p-4">
                <h5>Pending</h5>
                <h2 th:text="${pendingTasks}">0</h2>
            </div>
        </div>

    </div>

    <!-- Quick Actions -->
    <div class="text-center mt-5">
        <a th:href="@{/tasks}" class="btn btn-primary me-2">View All Tasks</a>
        <a th:href="@{/createTask}" class="btn btn-success">Create New Task</a>
    </div>

</div>

</body>
</html>
