<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TaskManagerApp | Welcome</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* SAME THEME AS LOGIN & REGISTER */
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            height: 100vh;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div class="card shadow p-5 text-center" style="width: 400px;">

    <h2 class="mb-3">Admin Task Manager</h2>

    <div class="d-grid gap-3 mt-4">
        <a class="btn btn-primary" th:href="@{/adminLogin}">Login</a>
        <a class="btn btn-primary" th:href="@{/adminRegister}">Register</a>
    </div>

</div>

</body>
</html>
