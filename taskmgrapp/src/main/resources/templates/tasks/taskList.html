<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TaskManagerApp | Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            min-height: 100vh;
        }

        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

<!-- Header -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Task Manager</span>

    <div>
        <a th:href="@{/login}" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container py-5">

    <!-- Title -->
    <h2 class="text-center text-white mb-4">Task Dashboard</h2>

    <!-- Alerts -->
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div th:if="${param.success}"
                 class="alert alert-success alert-dismissible fade show" role="alert">
                Task created successfully 🎉
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${param.updated}"
                 class="alert alert-success alert-dismissible fade show" role="alert">
                Task updated successfully ✨
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

        </div>
    </div>

    <!-- Card -->
    <div class="card shadow p-4">

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Status</th>
                    <th>Priority</th>
                    <th class="text-center">Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="task, stat : ${tasks}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${task.name}"></td>
                    <td th:text="${task.description}"></td>
                    <td th:text="${task.startDate}"></td>
                    <td th:text="${task.endDate}"></td>

                    <td>
                        <span class="badge bg-info text-dark"
                              th:text="${task.status}"></span>
                    </td>

                    <td>
                        <span class="badge bg-warning text-dark"
                              th:text="${task.priority}"></span>
                    </td>

                    <td class="text-center">
                        <a th:href="@{/tasks/edit/{id}(id=${task.id})}"
                           class="btn btn-primary mb-1">
                            Edit
                        </a>

                        <a th:href="@{/tasks/delete/{id}(id=${task.id})}"
                           class="btn btn-danger"
                           onclick="return confirm('Delete this task?')">
                            Delete
                        </a>
                    </td>
                </tr>
                </tbody>

            </table>

        </div>

        <!-- ✅ Back Button (CORRECT PLACE) -->
        <div class="text-center mt-3">
            <a th:href="@{/dashboard}" class="btn btn-secondary px-4">
                ← Back
            </a>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
