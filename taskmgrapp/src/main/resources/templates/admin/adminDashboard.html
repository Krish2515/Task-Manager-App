<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: linear-gradient(to right, #667eea, #764ba2); /* YOUR ORIGINAL */
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 220px;
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.85);
            padding-top: 20px;
            color: white;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: #ddd;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #5a67d8;
            color: white;
        }

        /* Content */
        .content {
            margin-left: 220px;
            padding: 30px;
        }

        h2 {
            color: white;
        }

        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4>Admin Panel</h4>
    <hr>

    <a href="/admin/adminDashboard">🏠 Dashboard</a>
    <a href="/admin/users">👥 Manage Users</a>
    <a href="/admin/tasks">📋 Manage Tasks</a>

    <hr>
    <a href="/adminLogin" class="text-danger">🚪 Logout</a>
</div>

<!-- Main Content -->
<div class="content">

    <h2 class="text-center mb-4">Admin Dashboard</h2>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card text-center p-4 shadow">
                <h5>Total Users</h5>
                <h2 th:text="${totalUsers}" style="color:black;">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center p-4 shadow">
                <h5>Total Tasks</h5>
                <h2 th:text="${totalTasks}" style="color:black;">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center p-4 shadow">
                <h5>Completed</h5>
                <h2 th:text="${completedTasks}" style="color:black;">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center p-4 shadow">
                <h5>Pending</h5>
                <h2 th:text="${pendingTasks}" style="color:black;">0</h2>
            </div>
        </div>

    </div>

</div>

</body>
</html>
