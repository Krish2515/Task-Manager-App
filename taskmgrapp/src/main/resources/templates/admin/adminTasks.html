<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Tasks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: linear-gradient(to right, #667eea, #764ba2);
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 220px;
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.85);
            padding-top: 20px;
            color: white;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: #ddd;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #5a67d8;
            color: white;
        }

        /* Content */
        .content {
            margin-left: 220px;
            padding: 30px;
        }

        h2 {
            color: white;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4>Admin Panel</h4>
    <hr>

    <a href="/admin/adminDashboard">🏠 Dashboard</a>
    <a href="/admin/users">👥 Manage Users</a>
    <a href="/admin/tasks">📋 Manage Tasks</a>

    <hr>
    <a href="/adminLogin" class="text-danger">🚪 Logout</a>
</div>

<!-- Content -->
<div class="content">

    <h2 class="text-center mb-4">Manage Tasks</h2>

    <div class="table-container shadow">

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>User ID</th>
                <th>User Name</th>
                <th>Name</th>
                <th>Description</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="task : ${tasks}">
                <td th:text="${task.user.id}"></td>
                <td th:text="${task.user.name}"></td>
                <td th:text="${task.name}"></td>
                <td th:text="${task.description}"></td>
                <td th:text="${task.status}"></td>

                <td>
                    <a th:href="@{'/admin/tasks/delete/' + ${task.id}}"
                       class="btn btn-danger btn-sm">
                        Delete
                    </a>
                </td>
            </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
